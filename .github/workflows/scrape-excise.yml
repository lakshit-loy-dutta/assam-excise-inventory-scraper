name: Assam Excise Scraper Scheduler

on:
    schedule:
        # Runs at 2:00 AM every Monday (Cron syntax is UTC, adjust as needed)
        - cron: "0 2 * * 1"
    workflow_dispatch: # Allows you to click a button to run it manually!

jobs:
    scrape-and-sync:
        runs-on: ubuntu-latest

        steps:
            - name: Checkout Repository
              uses: actions/checkout@v3

            - name: Set up Python
              uses: actions/setup-python@v4
              with:
                  python-version: "3.10"

            - name: Install Dependencies
              run: pip install -r requirements.txt

            - name: Run Scraper and Sync to Supabase
              env:
                  SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
                  SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
              run: python scraper.py
